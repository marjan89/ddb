id: TC-T18-tabview-switching
name: "T18: NavigationBar 3-tab switching via tab Goto labels"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T18 Tabs"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T18 Tab Alpha Content"}
  - assert: element_not_exists
    target: {content_fuzzy: "T18 Tab Beta Content"}
  - action: tap
    target: {content_fuzzy: "T18 Goto Beta"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T18 Tab Beta Content"}
  - assert: element_not_exists
    target: {content_fuzzy: "T18 Tab Alpha Content"}
  - action: tap
    target: {content_fuzzy: "T18 Goto Gamma"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T18 Tab Gamma Content"}
  - assert: element_not_exists
    target: {content_fuzzy: "T18 Tab Beta Content"}
