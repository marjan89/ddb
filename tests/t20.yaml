id: TC-T20-pull-to-refresh
name: "T20: pull-to-refresh fires PullToRefreshBox callback (counter++)"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T20 Refresh"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T20 Counter"}
    text: "T20 Counter 0"
  - action: scroll
    direction: down
  - action: wait_idle
    seconds: 3
  - assert: element_exists
    target: {content_fuzzy: "T20 Counter"}
    text: "T20 Counter 1"
