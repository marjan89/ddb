id: TC-T7-dialog
name: "T7: alert open/closed state via show + ok"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T7 Dialog"}
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "Show Alert"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "open"}
  - action: tap
    target: {content_fuzzy: "OK"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "closed"}
