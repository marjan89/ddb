# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t12.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo-xml.
app: io.substrate.regdemo-xml
id: TC-T12-text-field-set
name: "T12: agent /text-field/set replaces TextField value atomically"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T12 Paste"}
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T12 Input"}
  # TD-96: 1s wait_idle was too short for the Compose accessibility tree to
  # stabilise after the focus tap. The agent's findFocusedEditableVirtualId()
  # reflective walk would race the IME-visibility / recompose pass, return
  # null, and POST /text-field/set would 400 with "no focused EditText"
  # (1/3 fail in the bucket-2 flake drill). 3s covers the slow tail observed.
  # Structural fix (focus-probe endpoint) tracked separately.
  - action: wait_idle
    seconds: 3
  - action: api_call
    url: "http://localhost:19878/text-field/set"
    method: "POST"
    body:
      value: "T12 pasted content"
  - action: wait_idle
    seconds: 1
  - assert: element_exists
    target: {content_fuzzy: "T12 pasted content"}
