# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t4.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T4-navigate
name: "T4: navigate to detail and back"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T4 Navigate"}
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "Go Detail"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "Detail Visible"}
  - action: tap
    target: {content_fuzzy: "Go Back"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T4 Navigate"}

  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t4-semantic.yaml"
