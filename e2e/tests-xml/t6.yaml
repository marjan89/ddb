# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t6.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T6-secure-field
name: "T6: type into SecureField, mirror reflects value"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T6 Secure Field"}
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T6 password"}
  - action: type
    text: "secret"
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "secret"}
