# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t26.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T26-hide-show
name: "T26: toggle visibility hides/shows target Text"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T26 Hide Show"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T26 Target"}
  - action: tap
    target: {content_fuzzy: "T26 Toggle Visibility"}
  - action: wait_idle
    seconds: 2
  - assert: element_not_exists
    target: {content_fuzzy: "T26 Target"}
  - action: tap
    target: {content_fuzzy: "T26 Toggle Visibility"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T26 Target"}
