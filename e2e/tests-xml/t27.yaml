# Epic M / M-4 — XML demo variant of the Compose TC (mirror of ../tests/t27.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T27-target-type-filter
name: "T27: target type-filter (Target.type field) — wdaFindElements with type predicate"
steps:
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T1 Launch", type: "Button"}
  - assert: element_exists
    target: {content_fuzzy: "T22 Long Press", type: "Button"}
  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t27-semantic.yaml"
