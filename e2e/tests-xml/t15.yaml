# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t15.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo-xml.
app: io.substrate.regdemo-xml
id: TC-T15-element-state
name: "T15: element_state enabled/disabled via content_fuzzy"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T15 State"}
  - action: wait_idle
    seconds: 2
  - assert: element_state
    target: {content_fuzzy: "Action Button"}
    enabled: true
  - action: tap
    target: {content_fuzzy: "Toggle Action"}
  - action: wait_idle
    seconds: 2
  - assert: element_state
    target: {content_fuzzy: "Action Button"}
    enabled: false
