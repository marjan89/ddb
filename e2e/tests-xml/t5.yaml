# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t5.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo-xml.
app: io.substrate.regdemo-xml
id: TC-T5-keyboard-dismiss
name: "T5: keyboard state toggles via dismiss button"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T5 Kbd Dismiss"}
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T5 input"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "shown"}
  - action: tap
    target: {content_fuzzy: "Dismiss Keyboard"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "hidden"}
