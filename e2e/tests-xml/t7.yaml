# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t7.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T7-dialog
name: "T7: alert open/closed state via show + ok"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T7 Dialog"}
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "Show Alert"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "open"}
  - action: tap
    target: {content_fuzzy: "OK"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "closed"}

  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t7-semantic.yaml"
