# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t3.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T3-tap
name: "T3: tap increments counter to 3"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T3 Tap"}
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "Increment"}
  - action: tap
    target: {content_fuzzy: "Increment"}
  - action: tap
    target: {content_fuzzy: "Increment"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "3"}

  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t3-semantic.yaml"
