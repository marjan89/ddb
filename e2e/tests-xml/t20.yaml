# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t20.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T20-pull-to-refresh
name: "T20: pull-to-refresh fires PullToRefreshBox callback (counter++)"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T20 Refresh"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T20 Counter"}
    text: "T20 Counter 0"
  - action: scroll
    direction: down
  - action: wait_idle
    seconds: 3
  - assert: element_exists
    target: {content_fuzzy: "T20 Counter"}
    text: "T20 Counter 1"

  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t20-semantic.yaml"
