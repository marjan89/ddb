# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t9.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T9-wait
name: "T9: wait_until async-appearing element"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T9 Wait"}
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T9 Trigger"}
  - action: wait_until
    target: {content_fuzzy: "T9 Delayed Element"}
    seconds: 5
  - assert: element_exists
    target: {content_fuzzy: "T9 Delayed Element"}
