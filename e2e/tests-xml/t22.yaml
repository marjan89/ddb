# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t22.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T22-long-press
name: "T22: long-press toggles state Idle ↔ Pressed"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T22 Long Press"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T22 Idle"}
  - action: long_press
    target: {content_fuzzy: "T22 Press Target"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T22 Pressed"}

  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t22-semantic.yaml"
