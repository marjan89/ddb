# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t34.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T34-logged-in-precondition
name: "T34: logged_in:true precondition runs login recipe, leaves demo in T13 Unlocked"
precondition:
  logged_in: true
steps:
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T13 Unlocked"}
  - assert: element_not_exists
    target: {content_fuzzy: "T13 Locked"}

  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t34-semantic.yaml"
