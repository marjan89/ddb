# Epic M / M-4 — XML demo variant of the Compose TC (mirror of ../tests/t37.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T37-fixture-interpolation
name: "T37: {{fixtures.X.Y}} substitution (FixtureResolver.swift:85) — loaded from regression-ios/fixtures.yaml"
steps:
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "{{fixtures.homescreen.first_link}}"}
  - action: tap
    target: {content_fuzzy: "{{fixtures.homescreen.spinner_link}}"}
  - action: wait_idle
    seconds: 3
  - assert: element_exists
    target: {content_fuzzy: "{{fixtures.homescreen.spinner_target}}"}
  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t37-semantic.yaml"
