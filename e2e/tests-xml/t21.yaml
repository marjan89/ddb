# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t21.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T21-press-back
name: "T21: press_back pops back to Home"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T21 Press Back"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T21 Inside"}
  - action: press_back
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T1 Launch"}

  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t21-semantic.yaml"
