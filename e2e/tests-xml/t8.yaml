# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t8.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T8-scroll
name: "T8: scroll_to bottom of long list"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T8 Scroll"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "scroll.top"}
  - action: scroll_to
    target: {content_fuzzy: "scroll.bottom"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "scroll.bottom"}

  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t8-semantic.yaml"
