# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t2.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T2-type
name: "T2: type into field, mirror reflects value"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T2 Type"}
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T2 input"}
  - action: type
    text: "hello"
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "hello"}
