# Epic M / M-4 — XML demo variant of the Compose TC (mirror of ../tests/t16-negative.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T16-negative
name: "T16-NEG: element_exists+text with wrong text MUST FAIL on patched runner"
# Run via regress-ios.sh --expect-fail tests/t16-negative.yaml
#
# Semantics:
#   - Patched idb (97368e9+): assertion FAILS (text mismatch enforced) → --expect-fail gate PASSES.
#   - Pre-patch idb (a6698b6): assertion PASSES (text field ignored at content-equality time) → --expect-fail gate FAILS.
# The divergence is the regression evidence.
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T16 Text Equal"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T16 expected"}
    text: "wrong value"
  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t16-negative-semantic.yaml"
