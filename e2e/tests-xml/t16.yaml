# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t16.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T16-text-equal
name: "T16: element_exists exact text match"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T16 Text Equal"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T16 expected"}
    text: "T16 expected value"

  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t16-semantic.yaml"
