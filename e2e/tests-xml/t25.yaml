# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t25.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T25-scroll
name: "T25: LazyColumn scroll to find off-screen item"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T25 Scroll"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T25 Item 01"}
  - action: scroll_to
    target: {content_fuzzy: "T25 Item 30"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T25 Item 30"}
