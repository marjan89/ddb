# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t17.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T17-animations-smoke
name: "T17: animations screen renders spinner without crash"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T17 Animations"}
  - action: wait_idle
    seconds: 3
  - assert: element_exists
    target: {content_fuzzy: "T17 Spinner"}
