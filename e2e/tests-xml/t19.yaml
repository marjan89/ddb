# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t19.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T19-sheet-present-dismiss
name: "T19: ModalBottomSheet present + dismiss"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T19 Sheet"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T19 Show Sheet"}
  - action: tap
    target: {content_fuzzy: "T19 Show Sheet"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T19 Sheet Content"}
  - assert: element_exists
    target: {content_fuzzy: "T19 Dismiss Sheet"}
  - action: tap
    target: {content_fuzzy: "T19 Dismiss Sheet"}
  - action: wait_idle
    seconds: 2
  - assert: element_not_exists
    target: {content_fuzzy: "T19 Sheet Content"}

  - action: capture
    output: "/Users/Shared/projects/substrate-distro/ddb/e2e/captures/t19-semantic.yaml"
