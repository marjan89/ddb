# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t23.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo-xml.
app: io.substrate.regdemo-xml
id: TC-T23-capture
name: "T23: capture verb writes per-TC semantic YAML"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T23 Capture"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T23 Capture Anchor"}
