# Epic M / M-2 — XML demo variant of the Compose TC (mirror of ../tests/t14.yaml).
# Element IDs follow the M-1 scaffold convention: T<N>_<element-name> as android resource id.
# Runner: install ddb/e2e/demo-app-xml/ and target package io.substrate.regdemo.xml.
app: io.substrate.regdemo.xml
id: TC-T14-screen-assert
name: "T14: navigate to anchor screen and back"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T14 Screen"}
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "Open T14 Anchor"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "T14 Screen Anchor"}
  - action: tap
    target: {content_fuzzy: "T14 Back"}
  - action: wait_idle
    seconds: 2
  - assert: element_exists
    target: {content_fuzzy: "Open T14 Anchor"}
