id: TC-T10-mock-url-intercept
name: "T10: agent /mock intercepts HttpURLConnection response"
steps:
  - action: wait_idle
    seconds: 2
  - action: tap
    target: {content_fuzzy: "T10 Mock URL"}
  - action: wait_idle
    seconds: 2
  - action: api_call
    url: "http://localhost:19878/mock"
    method: "POST"
    body:
      mocks:
        - url_pattern: "/t10"
          method: "GET"
          response:
            status: 200
            body: "T10 Mocked Response Body"
  - action: tap
    target: {content_fuzzy: "T10 Fetch"}
  - action: wait_idle
    seconds: 3
  - assert: element_exists
    target: {content_fuzzy: "T10 Mocked Response Body"}
  - action: api_call
    url: "http://localhost:19878/unmock"
    method: "POST"
    body:
      url_pattern: "/t10"
